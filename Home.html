<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookora.in</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <style>
    body {
      margin: 0px;
      padding: 0px;
    }
    .container {
      background-color: rgb(10, 1, 6);

      border: solid black;
    }

    .alltogether {
      display: flex;
      justify-content: space-between;
      padding: 12px 40px;
      align-items: center;
    }

    .right {
      display: flex;
      justify-content: center;
      gap: 80px;

      border-radius: 8px;
      padding: 12px 40px;
      width: 900px;

      margin-right: auto;
      align-items: center;
      font-size: 20px;

      font-family: "Poppins", sans-serif;
      font-weight: 500;
      color: white;
    }

    .cards {
      border: 2px solid black;
      color: blue;
      background-color: rgb(20, 2, 5);
    }

    .upper {
      display: flex;
      gap: 20px;

      padding: 12px;
    }

    .lower {
      display: flex;
      gap: 20px;

      padding: 12px;
    }

    .card {
      width: 250px;
      border: 2px solid #050404;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
    }

    .card img {
      height: 320px;
      object-fit: cover;
      width: 100%;
      display: block;
    }

    .logo img {
      height: 100px;
      width: auto;
      display: block;
    }
  </style>
  <body>
    <div class="container">
      <div class="alltogether">
        <div class="logo"><img src="Bookora.png" alt="" /></div>
        <div class="right">
          <div><b>Home</b></div>
          <div><b>Category</b></div>
          <div><b>Contact</b></div>
          <div><b>About</b></div>
        </div>
      </div>
      <div class="cards">
        <div class="upper">
          <div class="card"><img src="becoming.jpg" alt="" /></div>
          <div class="card"><img src="cleopatra.jpg" alt="" /></div>
          <div class="card"><img src="die.jpg" alt="" /></div>
          <div class="card"><img src="guide to murder.jpg" alt="" /></div>
          <div class="card"><img src="hobbit.jpg" alt="" /></div>
        </div>
        <div class="lower">
          <div class="card"><img src="little life.jpg" alt="" /></div>
          <div class="card"><img src="mocking bird.jpg" alt="" /></div>
          <div class="card"><img src="anxious people.jpg" alt="" /></div>
          <div class="card"><img src="powerless.jpg" alt="" /></div>
          <div class="card"><img src="survive or sink.jpg" alt="" /></div>
        </div>
      </div>
    </div>
  </body>
</html>
